name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: cloudflare-workers-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
      CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
      DATALAB_API_KEY: ${{ secrets.DATALAB_API_KEY }}
      DATALAB_API_BASE: ${{ secrets.DATALAB_API_BASE }}
      SAHMK_API_KEY: ${{ secrets.SAHMK_API_KEY }}
      SAHMK_API_BASE: ${{ secrets.SAHMK_API_BASE }}
      TWELVEDATA_API_KEY: ${{ secrets.TWELVEDATA_API_KEY }}
      TWELVEDATA_API_BASE: ${{ secrets.TWELVEDATA_API_BASE }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Build OpenNext bundle
        run: bun run cf:build

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
