<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f1117"/>
      <stop offset="50%" stop-color="#1a1f2e"/>
      <stop offset="100%" stop-color="#0f1117"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="logo" x1="0" y1="0" x2="44" y2="44" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Top accent bar -->
  <rect width="1200" height="4" fill="url(#accent)"/>

  <!-- Logo box -->
  <rect x="80" y="80" width="52" height="52" rx="12" fill="url(#logo)"/>
  <text x="106" y="114" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="white" text-anchor="middle">W</text>

  <!-- Brand name -->
  <text x="148" y="115" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#e2e8f0">Wealix</text>

  <!-- Main headline -->
  <text x="80" y="260" font-family="Arial, sans-serif" font-size="58" font-weight="800" fill="#f8fafc">Wealix — Your Personal</text>
  <text x="80" y="330" font-family="Arial, sans-serif" font-size="58" font-weight="800" fill="#f8fafc">Wealth OS</text>

  <!-- Subtitle -->
  <text x="80" y="400" font-family="Arial, sans-serif" font-size="26" fill="#94a3b8">AI-powered portfolio tracking for MENA investors</text>

  <!-- Feature pills -->
  <rect x="80" y="450" width="200" height="40" rx="20" fill="rgba(99,102,241,0.15)" stroke="rgba(99,102,241,0.4)" stroke-width="1"/>
  <text x="180" y="476" font-family="Arial, sans-serif" font-size="15" font-weight="600" fill="#818cf8" text-anchor="middle">Portfolio Tracker</text>

  <rect x="296" y="450" width="160" height="40" rx="20" fill="rgba(99,102,241,0.15)" stroke="rgba(99,102,241,0.4)" stroke-width="1"/>
  <text x="376" y="476" font-family="Arial, sans-serif" font-size="15" font-weight="600" fill="#818cf8" text-anchor="middle">FIRE Planner</text>

  <rect x="472" y="450" width="170" height="40" rx="20" fill="rgba(99,102,241,0.15)" stroke="rgba(99,102,241,0.4)" stroke-width="1"/>
  <text x="557" y="476" font-family="Arial, sans-serif" font-size="15" font-weight="600" fill="#818cf8" text-anchor="middle">AI Advisor</text>

  <!-- Bottom right badge -->
  <rect x="1040" y="560" width="120" height="36" rx="18" fill="rgba(99,102,241,0.15)" stroke="rgba(99,102,241,0.3)" stroke-width="1"/>
  <text x="1100" y="583" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#818cf8" text-anchor="middle">wealix.app</text>
</svg>
